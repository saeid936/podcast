version: '3.8'

services:
  app:
    build:
      context: .
      target: production
    restart: always
    volumes:
      - .env:/app/.env:ro
    depends_on:
      - db
      - redis
      - minio
    networks:
      - audiostream_network

  db:
    image: postgres:15-alpine
    ports: []
    restart: always
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=audiostream
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - audiostream_network

  redis:
    image: redis:7-alpine
    ports: []
    restart: always
    networks:
      - audiostream_network

  minio:
    image: minio/minio:latest
    restart: always
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    command: server /data
    volumes:
      - minio_data:/data
    networks:
      - audiostream_network

networks:
  audiostream_network:
    driver: bridge

volumes:
  postgres_data:
  minio_data:
