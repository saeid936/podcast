version: '3.8'

services:
  # Main Application Service
  app:
    container_name: audiostream_app
    build:
      context: .
      target: development
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/audiostream?schema=public
      - REDIS_URL=redis://redis:6379
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - audiostream_network

  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: audiostream_db
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=audiostream
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d audiostream"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - audiostream_network

  # Redis for Caching and Queues
  redis:
    image: redis:7-alpine
    container_name: audiostream_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - audiostream_network

networks:
  audiostream_network:
    driver: bridge

volumes:
  postgres_data:
